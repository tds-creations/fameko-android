<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fameko Admin - Fleet Owners</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #004E89;
            --primary-light: #0077D3;
            --secondary-color: #28A745;
            --danger-color: #DC3545;
            --warning-color: #FFC107;
            --light-bg: #F8F9FA;
            --dark-text: #2D333A;
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 70px;
            --card-border: 1px solid #E9ECEF;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --header-text: #1A202C;
            --muted-text: #718096;
            --border-color: #E2E8F0;
        }

        [data-theme="dark"] {
            --light-bg: #121826;
            --dark-text: #E2E8F0;
            --sidebar-bg: #1A202C;
            --card-bg: #1F2937;
            --header-text: #F7FAFC;
            --muted-text: #9CA3AF;
            --border-color: #374151;
            --card-border: 1px solid #374151;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--light-bg);
            color: var(--dark-text);
            line-height: 1.4;
            transition: background-color 0.3s, color 0.3s;
        }



        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 24px 32px;
            max-width: 1400px;
            transition: var(--transition);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: var(--header-text);
        }

        .search-bar {
            background: var(--card-bg);
            padding: 6px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            width: 300px;
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            margin-left: 8px;
            font-size: 0.8rem;
            background: transparent;
            color: var(--dark-text);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: var(--card-border);
            padding: 0;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dark-text);
        }

        .table-container { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 20px;
            background: var(--light-bg);
            font-weight: 600;
            color: var(--muted-text);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        tr:hover td { background-color: var(--light-bg); }

        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-PENDING { background: #FEF3C7; color: #92400E; }
        .status-APPROVED { background: #D1FAE5; color: #065F46; }
        .status-REJECTED { background: #FEE2E2; color: #991B1B; }
        .status-SUSPENDED { background: #FFF4E6; color: #D9480F; }

        .btn {
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }

        .btn-approve { background-color: #38A169; color: white; }
        .btn-reject { background-color: var(--light-bg); color: #E53E3E; }
        .btn:hover { transform: translateY(-1px); }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 4px 12px 4px 4px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 0.8rem;
        }

        .user-name { font-weight: 600; font-size: 0.8rem; color: var(--dark-text); }

    </style>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div th:replace="~{admin_sidebar :: sidebar}"></div>

    <div class="main-content" id="main-content">
        <div class="header">
            <h1>Fleet Owner Management</h1>

            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="search-bar">
                    <i class="fas fa-search" style="color: #adb5bd"></i>
                    <input type="text" placeholder="Search fleet owners..." aria-label="Search">
                </div>

                <div class="user-profile">
                    <div class="user-avatar" th:text="${not #strings.isEmpty(admin.username) ? #strings.substring(admin.username, 0, 1) : 'A'}">A</div>
                    <div style="display:flex; flex-direction:column">
                        <span class="user-name" th:text="${admin.username}">Administrator</span>
                        <span style="font-size:0.7rem; color: var(--muted-text); font-weight:700" th:text="${admin.role + (admin.region != null ? ' - ' + admin.region : '')}">SUPERADMIN</span>
                    </div>
                    <i class="fas fa-chevron-down" style="font-size: 0.7rem; color: #adb5bd"></i>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-building" style="color: var(--primary-color)"></i>
                    <span th:text="${selectedStatus != '' ? selectedStatus + ' Fleet Owners' : 'All Registered Fleet Owners'}">All Registered Fleet Owners</span>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select onchange="window.location.href='/admin/fleet-owners?status=' + document.getElementById('statusFilter').value + '&amp;region=' + this.value"
                            style="padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border-color); font-size: 0.75rem; font-weight: 600; color: var(--dark-text); outline: none; background: var(--light-bg);">
                        <option value="">All Regions</option>
                        <option th:each="r : ${ {'Ahafo', 'Ashanti', 'Bono', 'Bono East', 'Central', 'Eastern', 'Greater Accra', 'Northern', 'North East', 'Oti', 'Savannah', 'Upper East', 'Upper West', 'Volta', 'Western', 'Western North'} }"
                                th:value="${r}" th:text="${r}" th:selected="${selectedRegion == r}"></option>
                    </select>

                    <input type="hidden" id="statusFilter" th:value="${selectedStatus}"/>

                    <a href="/admin/fleet-owners" class="btn" th:style="${selectedStatus == '' ? 'background: var(--primary-color); color: white;' : 'background: var(--light-bg); color: var(--dark-text);'}">All</a>
                    <a th:href="${'/admin/fleet-owners?status=APPROVED' + (selectedRegion != '' ? '&amp;region=' + selectedRegion : '')}" class="btn" th:style="${selectedStatus == 'APPROVED' ? 'background: var(--primary-color); color: white;' : 'background: var(--light-bg); color: var(--dark-text);'}">Approved</a>
                    <a th:href="${'/admin/fleet-owners?status=PENDING' + (selectedRegion != '' ? '&amp;region=' + selectedRegion : '')}" class="btn" th:style="${selectedStatus == 'PENDING' ? 'background: var(--primary-color); color: white;' : 'background: var(--light-bg); color: var(--dark-text);'}">Pending</a>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Owner / Company</th>
                            <th>Region</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="owner, iterStat : ${owners}">
                            <tr th:if="${iterStat.first or owners[iterStat.index - 1]['region'] != owner['region']}" style="background: var(--light-bg);">
                                <td colspan="5" style="padding: 12px 20px; font-weight: 800; font-size: 0.8rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); border-top: 1px solid var(--border-color);">
                                    <i class="fas fa-location-dot" style="margin-right: 8px;"></i>
                                    <span th:text="${owner['region']}">REGION</span>
                                    <span style="float: right; font-weight: 600; color: var(--muted-text); font-size: 0.7rem;"
                                          th:text="${groupedOwners[owner['region']].size() + ' owner(s)'}">
                                    </span>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div style="display: flex; align-items: center; gap: 12px">
                                        <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.7rem; background: var(--light-bg); color: var(--muted-text)" th:text="${not #strings.isEmpty(owner['name']) ? #strings.substring(owner['name'], 0, 1) : 'O'}">O</div>
                                        <div>
                                            <div style="font-weight:700; font-size: 0.9rem; color: var(--dark-text)" th:text="${owner['name']}">John Doe</div>
                                            <div style="font-size:0.75rem; color: var(--primary-color); font-weight: 600;" th:text="${owner['company_name']}">My Fleet Ltd</div>
                                        </div>
                                    </div>
                                </td>
                                <td>
                                    <div style="font-weight: 600; font-size: 0.85rem; color: var(--dark-text);" th:text="${owner['region']}">Accra</div>
                                </td>
                                <td>
                                    <div style="font-size: 0.8rem; color: var(--dark-text)">
                                        <i class="fas fa-phone" style="font-size: 0.7rem; color: var(--muted-text); margin-right: 4px;"></i>
                                        <span th:text="${owner['phone']}">024...</span>
                                    </div>
                                    <div style="font-size: 0.75rem; color: var(--muted-text)">
                                        <i class="fas fa-envelope" style="font-size: 0.7rem; margin-right: 4px;"></i>
                                        <span th:text="${owner['email']}">owner@example.com</span>
                                    </div>
                                </td>
                                <td>
                                    <span th:with="s=${owner['status'] != null ? owner['status'].toString().toUpperCase() : 'UNKNOWN'}"
                                          th:class="${'status-badge status-' + s}"
                                          th:text="${s}">PENDING</span>
                                </td>
                                <td>
                                    <div th:with="s=${owner['status'] != null ? owner['status'].toString().toUpperCase() : 'UNKNOWN'}"
                                         style="display:flex; gap:8px">
                                        <th:block th:if="${s == 'PENDING'}">
                                            <form th:action="${'/admin/fleet-owner/approve/' + owner['id']}" method="post">
                                                <button type="submit" class="btn btn-approve">
                                                    <i class="fas fa-check"></i> Approve
                                                </button>
                                            </form>
                                            <form th:action="${'/admin/fleet-owner/reject/' + owner['id']}" method="post">
                                                <button type="submit" class="btn btn-reject">
                                                    <i class="fas fa-xmark"></i> Reject
                                                </button>
                                            </form>
                                        </th:block>

                                        <th:block th:if="${s == 'APPROVED'}">
                                            <form th:action="${'/admin/fleet-owner/suspend/' + owner['id']}" method="post">
                                                <button type="submit" class="btn btn-reject" style="background: rgba(220, 53, 69, 0.1);">
                                                    <i class="fas fa-ban"></i> Suspend
                                                </button>
                                            </form>
                                        </th:block>

                                        <th:block th:if="${s == 'SUSPENDED'}">
                                            <form th:action="${'/admin/fleet-owner/release/' + owner['id']}" method="post">
                                                <button type="submit" class="btn btn-approve">
                                                    <i class="fas fa-unlock"></i> Release
                                                </button>
                                            </form>
                                        </th:block>

                                        <a th:href="${'/admin/fleet-owner/' + owner['id']}" class="btn" style="background: var(--light-bg); color: var(--primary-color)">
                                            <i class="fas fa-eye"></i> View Details
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{admin_sos_notifier :: sos_notifier}"></div>
</body>
</html>
