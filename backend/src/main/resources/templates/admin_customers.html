<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fameko Admin - Customers</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #004E89;
            --primary-light: #0077D3;
            --secondary-color: #28A745;
            --danger-color: #DC3545;
            --warning-color: #FFC107;
            --light-bg: #F8F9FA;
            --dark-text: #2D333A;
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 70px;
            --card-border: 1px solid #E9ECEF;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --header-text: #1A202C;
            --muted-text: #718096;
            --border-color: #E2E8F0;
        }

        [data-theme="dark"] {
            --light-bg: #121826;
            --dark-text: #E2E8F0;
            --sidebar-bg: #1A202C;
            --card-bg: #1F2937;
            --header-text: #F7FAFC;
            --muted-text: #9CA3AF;
            --border-color: #374151;
            --card-border: 1px solid #374151;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--light-bg);
            color: var(--dark-text);
            line-height: 1.4;
            transition: background-color 0.3s, color 0.3s;
        }



        /* Main Content */
        .main-content {
            flex: 1;
            padding: 24px 32px;
            transition: var(--transition);
        }   transition: var(--transition);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: var(--header-text);
        }

        .search-bar {
            background: var(--card-bg);
            padding: 6px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            width: 300px;
        }

        .search-bar input {
            border: none;
            outline: none;
            width: 100%;
            margin-left: 8px;
            font-size: 0.8rem;
            background: transparent;
            color: var(--dark-text);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: var(--card-border);
            padding: 0;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dark-text);
        }

        .table-container { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 20px;
            background: var(--light-bg);
            font-weight: 600;
            color: var(--muted-text);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--dark-text);
        }

        tr:hover td { background-color: var(--light-bg); }

        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-active { background: #D1FAE5; color: #065F46; }
        .status-inactive { background: #FEE2E2; color: #991B1B; }

        .btn {
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-1px); }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 4px 12px 4px 4px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 0.8rem;
        }

        .user-name { font-weight: 600; font-size: 0.8rem; color: var(--dark-text); }

    </style>
    <script>
        // Apply theme immediately
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div th:replace="~{admin_sidebar :: sidebar}"></div>

    <div class="main-content" id="main-content">
        <div class="header">
            <h1>Customer Management</h1>

            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="search-bar">
                    <i class="fas fa-search" style="color: #adb5bd"></i>
                    <input type="text" placeholder="Search customers..." aria-label="Search">
                </div>

                <div class="user-profile">
                    <div class="user-avatar" th:text="${not #strings.isEmpty(admin.username) ? #strings.substring(admin.username, 0, 1) : 'A'}">A</div>
                    <div style="display:flex; flex-direction:column">
                        <span class="user-name" th:text="${admin.username}">Administrator</span>
                        <span style="font-size:0.7rem; color: var(--muted-text); font-weight:700" th:text="${admin.role + (admin.region != null ? ' - ' + admin.region : '')}">SUPERADMIN</span>
                    </div>
                    <i class="fas fa-chevron-down" style="font-size: 0.7rem; color: #adb5bd"></i>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-user-group" style="color: var(--primary-color)"></i>
                    All Registered Customers
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Customer</th>
                            <th>Contact</th>
                            <th>Region</th>
                            <th>Status</th>
                            <th>Date Joined</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="customer : ${customers}">
                            <td>
                                <div style="display: flex; align-items: center; gap: 12px">
                                    <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.7rem; background: var(--light-bg); color: var(--muted-text)">
                                        <img th:if="${customer['profile_pic'] != ''}" th:src="${customer['profile_pic']}" style="width:100%; height:100%; object-fit:cover; border-radius: 50%;"/>
                                        <span th:unless="${customer['profile_pic'] != ''}" th:text="${#strings.substring(customer['name'], 0, 1)}">C</span>
                                    </div>
                                    <div>
                                        <div style="font-weight:700; font-size: 0.9rem; color: var(--dark-text)" th:text="${customer['name']}">Customer Name</div>
                                        <div style="font-size:0.75rem; color: var(--muted-text)" th:text="${customer['email']}">customer@example.com</div>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${customer['phone']}">024 123 4567</td>
                            <td th:text="${customer['region']}">Accra</td>
                            <td>
                                <span th:class="${customer['is_active'] ? 'status-badge status-active' : 'status-badge status-inactive'}"
                                      th:text="${customer['is_active'] ? 'Active' : 'Inactive'}">Active</span>
                            </td>
                            <td th:text="${customer['date_joined'] != null ? #strings.substring(customer['date_joined'], 0, 10) : 'N/A'}">2024-01-01</td>
                            <td>
                                <div style="display:flex; gap:8px;">
                                    <button class="btn" style="background: var(--light-bg); color: var(--primary-color)">
                                        <i class="fas fa-history"></i> History
                                    </button>
                                    <button class="btn btn-reject" th:onclick="'confirmTerminate(' + ${customer['id']} + ')'" title="Terminate Account">
                                        <i class="fas fa-trash-can"></i>
                                    </button>
                                </div>
                                <form th:id="'terminate-form-' + ${customer['id']}" th:action="${'/admin/customer/terminate/' + customer['id']}" method="post" style="display:none;"></form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{admin_sos_notifier :: sos_notifier}"></div>

    <script th:inline="javascript">
        function confirmTerminate(id) {
            if (confirm("CRITICAL ACTION: This will PERMANENTLY delete the customer profile from PostgreSQL and their authentication account from Firebase. \n\nAre you absolutely sure?")) {
                document.getElementById('terminate-form-' + id).submit();
            }
        }
    </script>
</body>
</html>
