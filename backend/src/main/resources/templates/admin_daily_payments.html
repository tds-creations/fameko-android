<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fameko Admin - Daily Payments</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #004E89;
            --primary-light: #0077D3;
            --secondary-color: #28A745;
            --danger-color: #DC3545;
            --warning-color: #FFC107;
            --light-bg: #F8F9FA;
            --dark-text: #2D333A;
            --sidebar-width: 240px;
            --sidebar-collapsed-width: 70px;
            --card-border: 1px solid #E9ECEF;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --header-text: #1A202C;
            --muted-text: #718096;
            --border-color: #E2E8F0;
        }

        [data-theme="dark"] {
            --light-bg: #121826;
            --dark-text: #E2E8F0;
            --sidebar-bg: #1A202C;
            --card-bg: #1F2937;
            --header-text: #F7FAFC;
            --muted-text: #9CA3AF;
            --border-color: #374151;
            --card-border: 1px solid #374151;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--light-bg);
            color: var(--dark-text);
            line-height: 1.4;
            transition: background-color 0.3s, color 0.3s;
        }



        /* Main Content */
        .main-content {
            flex: 1;
            padding: 24px 32px;
            transition: var(--transition);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: var(--header-text);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: var(--card-border);
            padding: 0;
            margin-bottom: 24px;
            overflow: hidden;
            transition: background 0.3s, border 0.3s;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--dark-text);
        }

        .table-container { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 10px 20px;
            background: var(--light-bg);
            font-weight: 600;
            color: var(--muted-text);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            color: var(--dark-text);
        }

        tr:hover td { background-color: var(--light-bg); }

        .btn {
            padding: 5px 12px;
            border-radius: 16px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }

        .btn-approve { background-color: #38A169; color: white; }
        .btn-reject { background-color: #E53E3E; color: white; }
        .btn:hover { transform: translateY(-1px); }

        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-fee { background: #EBF8FF; color: #3182CE; }
        .badge-topup { background: #F0FFF4; color: #38A169; }

        [data-theme="dark"] .badge-fee { background: #1A365D; color: #63B3ED; }
        [data-theme="dark"] .badge-topup { background: #1C4532; color: #68D391; }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 4px 12px 4px 4px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 0.8rem;
        }

        .user-name { font-weight: 600; font-size: 0.8rem; color: var(--dark-text); }

    </style>
    <script>
        // Apply theme immediately
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</head>
<body>
    <div th:replace="~{admin_sidebar :: sidebar}"></div>

    <div class="main-content" id="main-content">
        <div class="header">
            <h1>Daily Service Payments</h1>

            <div style="display: flex; gap: 20px; align-items: center;">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${not #strings.isEmpty(admin.username) ? #strings.substring(admin.username, 0, 1) : 'A'}">A</div>
                    <div style="display:flex; flex-direction:column">
                        <span class="user-name" th:text="${admin.username}">Administrator</span>
                        <span style="font-size:0.7rem; color:var(--muted-text); font-weight:700" th:text="${admin.role + (admin.region != null ? ' - ' + admin.region : '')}">SUPERADMIN</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <i class="fas fa-clock-rotate-left" style="color: var(--primary-color)"></i>
                    Pending Approvals
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Driver</th>
                            <th>Phone</th>
                            <th>Amount (GHS)</th>
                            <th>Type</th>
                            <th>Reference</th>
                            <th>Date Submitted</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${payments}">
                            <td>
                                <div style="font-weight:700; color: var(--dark-text)" th:text="${t.driver_name}">Driver Name</div>
                            </td>
                            <td th:text="${t.driver_phone}">Phone</td>
                            <td style="font-weight: 800; color: var(--secondary-color)" th:text="${'₵' + t.amount}">₵50</td>
                            <td>
                                <span th:class="${'status-badge ' + (t.payment_type == 'DAILY_FEE' ? 'badge-fee' : 'badge-topup')}" th:text="${t.payment_type}">DAILY_FEE</span>
                            </td>
                            <td><code style="background: var(--light-bg); padding: 4px 8px; border-radius: 4px; color: var(--primary-color); font-weight: 700; font-size: 0.75rem;" th:text="${t.reference}">REF123</code></td>
                            <td style="font-size: 0.8rem; color: var(--muted-text)" th:text="${#strings.substring(t.created_at, 0, 16)}">2023-01-01</td>
                            <td>
                                <div style="display: flex; gap: 8px;">
                                    <form action="/admin/daily-payments/approve" method="POST">
                                        <input type="hidden" name="id" th:value="${t.id}">
                                        <button type="submit" class="btn btn-approve">
                                            <i class="fas fa-check"></i> Approve
                                        </button>
                                    </form>
                                    <form action="/admin/daily-payments/reject" method="POST">
                                        <input type="hidden" name="id" th:value="${t.id}">
                                        <button type="submit" class="btn btn-reject">
                                            <i class="fas fa-xmark"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(payments)}">
                            <td colspan="7" style="text-align: center; color: var(--muted-text); padding: 60px;">
                                <i class="fas fa-circle-check" style="font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.5;"></i>
                                All clear! No pending payments.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{admin_sos_notifier :: sos_notifier}"></div>
</body>
</html>
