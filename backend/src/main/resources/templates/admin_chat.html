<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Support Chat | Fameko Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            display: flex;
            height: calc(100vh - 100px);
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 20px;
        }

        /* Contacts List */
        .chat-sidebar {
            width: 350px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #eee;
            background: #f9f9f9;
            outline: none;
        }
        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }
        .contact-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f9f9f9;
        }
        .contact-item:hover { background: #f5f5f5; }
        .contact-item.active { background: #e8f5e9; border-left: 4px solid #2ecc71; }
        .contact-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #eee;
            margin-right: 15px;
            object-fit: cover;
        }
        .contact-info { flex: 1; }
        .contact-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 3px; }
        .contact-last-msg { font-size: 0.8rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Chat Area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fbfbfb;
        }
        .chat-header {
            padding: 15px 25px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }
        .message.received {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .message.sent {
            align-self: flex-end;
            background: #2ecc71;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message-time {
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #eee;
            background: #f9f9f9;
            outline: none;
        }
        .send-btn {
            background: #2ecc71;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); background: #27ae60; }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #ccc;
        }
        .empty-state i { font-size: 4rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div th:replace="~{admin_sidebar :: sidebar}"></div>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>Support Chat</h1>
                    <p>Real-time driver assistance</p>
                </div>
                <div class="user-profile">
                    <span th:text="${admin.username}">Admin</span>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2ecc71&color=fff" alt="Profile">
                </div>
            </header>

            <div class="chat-container">
                <!-- Sidebar -->
                <div class="chat-sidebar">
                    <div class="sidebar-header">
                        <span>Conversations</span>
                        <i class="fas fa-sync-alt" onclick="loadContacts()" style="cursor:pointer; font-size: 0.9rem; opacity: 0.6"></i>
                    </div>
                    <div class="search-box">
                        <input type="text" placeholder="Search drivers...">
                    </div>
                    <div class="contacts-list" id="contactsList">
                        <!-- Contacts will be loaded here -->
                        <div style="padding: 20px; text-align: center; color: #999">Loading drivers...</div>
                    </div>
                </div>

                <!-- Main Chat -->
                <div class="chat-main">
                    <div id="chatWindow" style="display: none; flex-direction: column; height: 100%">
                        <div class="chat-header">
                            <img id="activeContactImg" src="" class="contact-img" alt="">
                            <div>
                                <div id="activeContactName" class="contact-name">Select a driver</div>
                                <div id="activeContactStatus" style="font-size: 0.75rem; color: #2ecc71">Online</div>
                            </div>
                        </div>
                        <div class="messages-container" id="messagesContainer">
                            <!-- Messages will be loaded here -->
                        </div>
                        <form class="chat-input-area" id="chatForm">
                            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                            <button type="submit" class="send-btn">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                    <div id="emptyState" class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>Select a driver to start chatting</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script th:inline="javascript">
        const adminId = [[${admin.username}]]; // Using username as ID for WS session
        let activeConversationId = null;
        let ws = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/ADMIN_${adminId}`);

            ws.onopen = () => console.log("WebSocket connected");
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === "NEW_MESSAGE") {
                    const msg = JSON.parse(data.payload);
                    if (msg.conversationId === activeConversationId) {
                        appendMessage(msg);
                        scrollToBottom();
                    }
                    loadContacts(); // Refresh list to show latest message/badge
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 5000);
        }

        async function loadContacts() {
            const response = await fetch('/admin/active-support');
            const drivers = await response.json();
            const list = document.getElementById('contactsList');

            if (drivers.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #999">No active support chats</div>';
                return;
            }

            list.innerHTML = drivers.map(d => `
                <div class="contact-item ${activeConversationId === d.conversationId ? 'active' : ''}"
                     onclick="selectDriver(${d.conversationId}, '${d.name}', '${d.profilePic}')">
                    <img src="${d.profilePic || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(d.name)}" class="contact-img">
                    <div class="contact-info">
                        <div class="contact-name">${d.name}</div>
                        <div class="contact-last-msg">Active support session</div>
                    </div>
                </div>
            `).join('');
        }

        async function selectDriver(convId, name, pic) {
            activeConversationId = convId;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('chatWindow').style.display = 'flex';
            document.getElementById('activeContactName').innerText = name;
            document.getElementById('activeContactImg').src = pic || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}`;

            // Highlight in list
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            loadContacts(); // Refresh to set active class

            // Load History
            const response = await fetch(`/chat/history/${convId}`);
            const messages = await response.json();
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            messages.forEach(appendMessage);
            scrollToBottom();
        }

        function appendMessage(msg) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            const isMe = msg.senderType === 'admin';
            div.className = `message ${isMe ? 'sent' : 'received'}`;

            const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            div.innerHTML = `
                <div>${msg.body}</div>
                <div class="message-time">${time}</div>
            `;
            container.appendChild(div);
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chatForm').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const body = input.value.trim();
            if (!body || !activeConversationId) return;

            const msg = {
                conversationId: activeConversationId,
                senderType: 'admin',
                senderId: 1, // System admin ID
                body: body,
                createdAt: new Date().toISOString(),
                read: false
            };

            const response = await fetch('/chat/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(msg)
            });

            if (response.ok) {
                const savedMsg = await response.json();
                appendMessage(savedMsg);
                input.value = '';
                scrollToBottom();
            }
        };

        window.onload = () => {
            loadContacts();
            connectWebSocket();
        };
    </script>
</body>
</html>
